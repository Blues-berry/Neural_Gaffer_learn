# Neural Gaffer Training Configuration with Highlight-Weighted Diffusion Loss
# 
# This configuration emphasizes highlight regions directly in latent/noise-space
# diffusion training, without decoding latents back to image space.
#
# Usage:
#   python neural_gaffer_training.py --config configs/highlight_aware_training.yaml
#
# Or override specific parameters:
#   python neural_gaffer_training.py --use_highlight_weighted_loss --highlight_loss_weight 2.0 --highlight_threshold 0.8

# Base model
pretrained_model_name_or_path: "kxic/zero123-xl"

# Output
output_dir: "./output_highlight_aware"
save_dir: "./"

# Training parameters
num_train_epochs: 30
training_batch_size: 4
gradient_accumulation_steps: 1
learning_rate: 1.0e-4
lr_scheduler: "constant"
lr_warmup_steps: 100
max_train_steps: 100000

# Model
resolution: 256
use_ema: true
enable_xformers_memory_efficient_attention: false
gradient_checkpointing: false

# Data
train_img_dir: '/scratch/datasets/hj453/objaverse-rendering/filtered_V2/rendered_images_resized'
train_lighting_dir: '/scratch/datasets/hj453/objaverse-rendering/filtered_V2/preprocessed_environment_resized/'
val_img_dir: './Neural_Gaffer/preprocessed_data'
val_lighting_dir: './preprocessed_lighting_data'

# Validation
validation_steps: 1000
num_validation_images: 2
num_validation_batches: 10

# Logging
report_to: "wandb"
tracker_project_name: "neural_gaffer_highlight_aware"
logging_steps: 50
checkpointing_steps: 5000

# Seed
seed: 42

# ========== HIGHLIGHT-WEIGHTED DIFFUSION LOSS ==========
# This reweights the standard diffusion loss in highlight regions.
use_highlight_weighted_loss: true

# Extra weight added to highlight regions on top of the base loss.
highlight_loss_weight: 2.0

# Luminance threshold used to define highlights from the target image.
highlight_threshold: 0.8

# Use a soft highlight score instead of a hard binary mask.
highlight_soft_weighting: true

# Larger gamma focuses more strongly on very bright regions.
highlight_gamma: 2.0

# Compute detailed metrics during validation
compute_metrics: true
